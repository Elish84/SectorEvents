<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול אירועים גזרתית</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-container" class="overlay">
        <div class="auth-box">
            <h2><i class="fas fa-shield-alt"></i> התחברות למערכת</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">דוא"ל</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">סיסמה</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn primary-btn" id="login-btn">התחבר</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- Main Content (Hidden until logged in) -->
    <div id="app-container" class="hidden">
        
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fas fa-satellite-dish"></i> מערכת ניהול אירועים
            </div>
            <div class="user-info">
                <span id="user-greeting">שלום, משתמש</span>
                <button id="logout-btn" class="btn small-btn outline-btn">התנתק</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="form-tab"><i class="fas fa-pen"></i><span>דיווח</span></button>
            <button class="nav-btn" data-tab="map-tab"><i class="fas fa-map-marked-alt"></i><span>מפה</span></button>
            <button class="nav-btn" data-tab="dashboard-tab"><i class="fas fa-chart-bar"></i><span>דשבורד</span></button>
            <button class="nav-btn" data-tab="records-tab"><i class="fas fa-list"></i><span>רשימות</span></button>
            <button class="nav-btn hidden" data-tab="admin-tab" id="nav-admin"><i class="fas fa-cog"></i><span>ניהול</span></button>
        </nav>

        <!-- Main Workspace -->
        <main>
            <!-- Tab 1: Event Form -->
            <section id="form-tab" class="tab-content active">
                <h2>דיווח אירוע חדש</h2>
                <form id="event-form" class="tactical-card">
                    <div class="form-group row">
                        <div class="half">
                            <label>זמן אירוע</label>
                            <input type="datetime-local" id="event-time" required>
                        </div>
                        <div class="half">
                            <label>שם המדווח</label>
                            <input type="text" id="reporter-name" required>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="half">
                            <label>תפקיד</label>
                            <select id="role-select" required><option value="">טוען...</option></select>
                        </div>
                        <div class="half">
                            <label>גזרה</label>
                            <select id="sector-select" required><option value="">טוען...</option></select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>סוג אירוע</label>
                        <select id="event-type-select" required><option value="">טוען...</option></select>
                    </div>

                    <!-- Location Picker -->
                    <div class="form-group location-group">
                        <label>מיקום (נ.צ)</label>
                        <div class="location-controls">
                            <button type="button" id="btn-gps" class="btn secondary-btn"><i class="fas fa-crosshairs"></i> מיקום נוכחי</button>
                            <button type="button" id="btn-map-pick" class="btn secondary-btn"><i class="fas fa-map-pin"></i> בחר במפה</button>
                        </div>
                        <input type="text" id="location-display" readonly placeholder="לא נבחר מיקום" required>
                        <input type="hidden" id="location-lat">
                        <input type="hidden" id="location-lng">
                    </div>

                    <!-- Detailed Toggles -->
                    <div class="toggle-group">
                        <label class="toggle">
                            <input type="checkbox" id="has-casualties">
                            <span class="slider"></span>
                            <span class="toggle-label">נפגעים?</span>
                        </label>
                        <textarea id="casualties-details" class="hidden" placeholder="פירוט נפגעים..."></textarea>
                    </div>

                    <div class="toggle-group">
                        <label class="toggle">
                            <input type="checkbox" id="has-damage">
                            <span class="slider"></span>
                            <span class="toggle-label">נזק?</span>
                        </label>
                        <textarea id="damage-details" class="hidden" placeholder="פירוט נזק..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>הערות נוספות</label>
                        <textarea id="event-notes" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn primary-btn full-width" id="btn-submit-event">
                        <i class="fas fa-paper-plane"></i> שלח דיווח
                    </button>
                </form>
            </section>

            <!-- Tab 2: Map View -->
            <section id="map-tab" class="tab-content">
                <div class="map-controls">
                    <button class="btn small-btn" id="toggle-heatmap"><i class="fas fa-fire"></i> מפת חום</button>
                    <button class="btn small-btn" id="filter-map"><i class="fas fa-filter"></i> סינון</button>
                </div>
                <!-- Map container -->
                <div id="main-map" class="map-container"></div>
                <!-- Floating Action Button for Map -->
                <button id="fab-add-event" class="fab"><i class="fas fa-plus"></i></button>
            </section>

            <!-- Map Picker Modal -->
            <div id="map-picker-modal" class="overlay hidden">
                <div class="modal-box map-modal-box">
                    <h3>בחר מיקום על המפה</h3>
                    <div id="picker-map" class="map-container small-map"></div>
                    <div class="modal-actions">
                        <button class="btn secondary-btn" id="btn-cancel-pick">ביטול</button>
                        <button class="btn primary-btn" id="btn-confirm-pick">אשר מיקום</button>
                    </div>
                </div>
            </div>

            <!-- Tab 3: Dashboard -->
            <section id="dashboard-tab" class="tab-content">
                <h2>דשבורד אירועים</h2>
                <div class="tactical-card chart-container">
                    <canvas id="sector-chart"></canvas>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4 id="stat-total">0</h4>
                        <p>סה"כ אירועים</p>
                    </div>
                    <div class="stat-card">
                        <h4 id="stat-today">0</h4>
                        <p>אירועים היום</p>
                    </div>
                </div>
            </section>

            <!-- Tab 4: Records -->
            <section id="records-tab" class="tab-content">
                <h2>רשימת אירועים</h2>
                <div class="table-controls">
                    <input type="text" id="search-events" placeholder="חפש אירוע...">
                </div>
                <div class="table-responsive tactical-card">
                    <table id="events-table">
                        <thead>
                            <tr>
                                <th>תאריך</th>
                                <th>סוג</th>
                                <th>גזרה</th>
                                <th>מדווח</th>
                                <th>פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="events-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Tab 5: Admin Panel (Hidden for non-admins) -->
            <section id="admin-tab" class="tab-content">
                <h2>ניהול מערכת</h2>
                <p class="admin-notice">אזור זה מיועד למנהלים בלבד. מכאן ניתן לנהל את רשימות המערכת.</p>
                
                <div class="admin-grid">
                    <!-- Event Types -->
                    <div class="tactical-card">
                        <h3><i class="fas fa-tags"></i> סוגי אירועים</h3>
                        <form id="add-event-type-form">
                            <input type="text" id="new-event-type-name" placeholder="שם סוג אירוע" required>
                            <input type="color" id="new-event-type-color" value="#ff0000">
                            <input type="text" id="new-event-type-icon" placeholder="שם אייקון (למשל fire)" required>
                            <button type="submit" class="btn small-btn primary-btn">הוסף</button>
                        </form>
                        <ul id="admin-event-types-list" class="admin-list"></ul>
                    </div>

                    <!-- Sectors -->
                    <div class="tactical-card">
                        <h3><i class="fas fa-map"></i> גזרות</h3>
                        <form id="add-sector-form">
                            <input type="text" id="new-sector-name" placeholder="שם גזרה" required>
                            <button type="submit" class="btn small-btn primary-btn">הוסף</button>
                        </form>
                        <ul id="admin-sectors-list" class="admin-list"></ul>
                    </div>

                    <!-- Roles -->
                    <div class="tactical-card">
                        <h3><i class="fas fa-users-cog"></i> תפקידים</h3>
                        <form id="add-role-form">
                            <input type="text" id="new-role-name" placeholder="שם תפקיד" required>
                            <button type="submit" class="btn small-btn primary-btn">הוסף</button>
                        </form>
                        <ul id="admin-roles-list" class="admin-list"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Export to global scope for our modular scripts to use until bundled (to avoid complex build steps, using global window context for Firebase references)
        window.firebaseModules = {
            initializeApp, getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut,
            getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, deleteDoc, writeBatch
        };
    </script>

    <!-- Leaflet & Heatmap -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- App Scripts (Deferred to ensure DOM and Firebase modules load) -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/map.js"></script>
    <script type="module" src="js/dashboard.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
